name: Build and Deploy Homework Page

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "assets/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
      - ".env.example"
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.quiet-guard.outputs.skipped }}
    env:
      NAVER_CAFE_BOARD_URL: ${{ secrets.NAVER_CAFE_BOARD_URL }}
      NAVER_ID: ${{ secrets.NAVER_ID }}
      NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
      NAVER_STORAGE_STATE_JSON: ${{ secrets.NAVER_STORAGE_STATE_JSON }}
      REQUIRE_LOGIN: ${{ vars.REQUIRE_LOGIN || 'true' }}
      MAX_POSTS: ${{ vars.MAX_POSTS || '80' }}
      DETAIL_CONCURRENCY: ${{ vars.DETAIL_CONCURRENCY || '4' }}
      CLASS_POST_LIMIT: ${{ vars.CLASS_POST_LIMIT || '2' }}
      HOMEWORK_AUTHOR: ${{ vars.HOMEWORK_AUTHOR || '그래그래그레이스' }}
      REFRESH_COOLDOWN_SECONDS: ${{ vars.REFRESH_COOLDOWN_SECONDS || '300' }}
      QUIET_HOURS_START: ${{ vars.QUIET_HOURS_START || '0' }}
      QUIET_HOURS_END: ${{ vars.QUIET_HOURS_END || '6' }}
      TIME_ZONE: ${{ vars.TIME_ZONE || 'Asia/Seoul' }}
      HEADLESS: "true"
      OUTPUT_DIR: ./public
      DATA_FILE: ./public/homework.json
      HTML_FILE: ./public/index.html
      STATE_FILE: ./public/run-state.json
      PAGE_TITLE: ${{ vars.PAGE_TITLE || 'TopStar 영어학원 숙제 체크리스트' }}
      APP_LOGO_FILE: ./assets/topstar-logo.png
      PAGES_URL: https://mlc-cpu.github.io/topstar_eng/
      SHORT_URL: https://is.gd/qDMgMU
    steps:
      - name: Quiet hours guard
        id: quiet-guard
        run: |
          skipped=false
          if [ "${{ github.event_name }}" = "schedule" ]; then
            current_hour=$((10#$(TZ=Asia/Seoul date +%H)))
            start_hour=$((10#${QUIET_HOURS_START}))
            end_hour=$((10#${QUIET_HOURS_END}))
            if [ "${start_hour}" -lt "${end_hour}" ]; then
              if [ "${current_hour}" -ge "${start_hour}" ] && [ "${current_hour}" -lt "${end_hour}" ]; then
                skipped=true
              fi
            elif [ "${start_hour}" -gt "${end_hour}" ]; then
              if [ "${current_hour}" -ge "${start_hour}" ] || [ "${current_hour}" -lt "${end_hour}" ]; then
                skipped=true
              fi
            fi
          fi
          echo "skipped=${skipped}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.quiet-guard.outputs.skipped != 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.quiet-guard.outputs.skipped != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.quiet-guard.outputs.skipped != 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.quiet-guard.outputs.skipped != 'true'
        run: npx playwright install --with-deps chromium

      - name: Restore optional storage state
        if: steps.quiet-guard.outputs.skipped != 'true'
        run: |
          if [ -n "${NAVER_STORAGE_STATE_JSON:-}" ]; then
            mkdir -p .state
            printf '%s' "$NAVER_STORAGE_STATE_JSON" > .state/naver-storage-state.json
          fi

      - name: Resolve auth strategy
        id: auth-strategy
        if: steps.quiet-guard.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          has_id=false
          has_pw=false
          has_state=false

          if [ -n "${NAVER_ID//[[:space:]]/}" ]; then
            has_id=true
          fi
          if [ -n "${NAVER_PASSWORD//[[:space:]]/}" ]; then
            has_pw=true
          fi
          if [ -s ".state/naver-storage-state.json" ]; then
            has_state=true
          fi

          strategy="none"
          has_credentials=false
          if [ "$has_id" = true ] && [ "$has_pw" = true ]; then
            has_credentials=true
          fi

          if [ "$has_state" = true ]; then
            # Prefer captcha-passed storage state first to avoid frequent login challenges.
            strategy="storage_state_first"
          elif [ "$has_credentials" = true ]; then
            strategy="credentials_only"
          else
            strategy="none"
          fi

          echo "strategy=${strategy}" >> "$GITHUB_OUTPUT"
          echo "has_state=${has_state}" >> "$GITHUB_OUTPUT"
          echo "has_credentials=${has_credentials}" >> "$GITHUB_OUTPUT"
          echo "::notice::naver auth strategy=${strategy}"

      - name: Randomized schedule delay
        if: steps.quiet-guard.outputs.skipped != 'true' && github.event_name == 'schedule'
        env:
          SCHEDULE_JITTER_MAX_SECONDS: ${{ vars.SCHEDULE_JITTER_MAX_SECONDS || '240' }}
        run: |
          set -euo pipefail
          max="${SCHEDULE_JITTER_MAX_SECONDS:-240}"
          if ! [[ "$max" =~ ^[0-9]+$ ]]; then
            max=240
          fi
          if [ "$max" -lt 0 ]; then
            max=0
          fi
          if [ "$max" -gt 240 ]; then
            max=240
          fi

          delay=$(( RANDOM % (max + 1) ))
          echo "Applying randomized schedule delay: ${delay}s"
          sleep "$delay"

      - name: Build static page
        if: steps.quiet-guard.outputs.skipped != 'true'
        run: |
          set -euo pipefail

          run_sync() {
            if [ "${{ github.event_name }}" = "schedule" ]; then
              npm run sync -- --scheduled
            else
              npm run sync
            fi
          }

          if run_sync; then
            exit 0
          fi

          if [ "${{ steps.auth-strategy.outputs.strategy }}" = "none" ]; then
            echo "::warning::No NAVER auth configured (NAVER_ID/NAVER_PASSWORD or NAVER_STORAGE_STATE_JSON)."
          fi

          if [ "${{ steps.auth-strategy.outputs.strategy }}" = "storage_state_first" ] && [ "${{ steps.auth-strategy.outputs.has_credentials }}" = "true" ]; then
            echo "::warning::sync failed with storage state. Retrying once with credential-only mode."
            rm -f .state/naver-storage-state.json
            sleep 3
          else
            echo "::warning::sync failed on first attempt, retrying once in 5s."
            sleep 5
          fi

          if run_sync; then
            exit 0
          fi

          echo "::warning::sync failed again. Falling back to previously deployed Pages files."
          mkdir -p public
          base_url="${PAGES_URL%/}"
          for file in homework.json index.html manifest.webmanifest sw.js icon.png icon.svg short-url.txt; do
            curl -fsSL "${base_url}/${file}" -o "public/${file}"
          done
          : > public/.nojekyll

      - name: Upload Pages artifact
        if: steps.quiet-guard.outputs.skipped != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: needs.build.outputs.skipped != 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
